global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # Ví dụ scrape thêm app riêng — bỏ comment khi cần
  # - job_name: my-app
  #   static_configs:
  #     - targets: ['host.docker.internal:3000']  # macOS/Windows
  #     # - targets: ['172.17.0.1:3000']           # Linux
